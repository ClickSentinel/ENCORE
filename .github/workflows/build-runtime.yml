name: Build portable Wine runtime

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: >-
          Optional assertion of the release version to package. Leave empty to
          use ENCORE_RELEASE_VERSION from scripts/versions.sh (the single source
          of truth); if set, it must match that value or the run fails.
        required: false
        default: ""
        type: string
      artifact_run_id:
        description: Existing workflow run ID to validate without rebuilding Wine
        required: false
        default: ""
        type: string

permissions:
  actions: read
  contents: read
  id-token: write
  attestations: write

# workflow_dispatch runs are easy to accidentally trigger twice on the same
# ref (as happened during this branch's own testing) - cancel a superseded
# in-flight run rather than burning a second full compile alongside it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build on Ubuntu 24.04
    runs-on: ubuntu-24.04
    outputs:
      artifact_run_id: ${{ steps.artifact_run.outputs.run_id }}
      release_version: ${{ steps.versions.outputs.release_version }}
      runtime_asset: ${{ steps.versions.outputs.runtime_asset }}
      wine_version: ${{ steps.versions.outputs.wine_version }}
    container:
      image: ubuntu:24.04
    timeout-minutes: 240
    env:
      DEBIAN_FRONTEND: noninteractive
      JOBS: "4"
      WINE_INSTALL_PREFIX: /opt/encore-wine
      SOURCE_DATE_EPOCH: "1783719732"

    steps:
      - name: Bootstrap the minimal build container
        run: |
          apt-get update
          apt-get install -y ca-certificates git

      - name: Check out ENCORE
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Resolve release identifiers from the single source of truth
        id: versions
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.release_version }}
        run: |
          set -Eeuo pipefail
          # scripts/versions.sh (via common.sh) defines the release version and
          # the derived asset names in one place; read them here instead of
          # hardcoding, so a version bump in versions.sh never has to be
          # mirrored into this workflow.
          cd scripts && . ./common.sh && cd ..
          if [ -n "$REQUESTED_VERSION" ] &&
             [ "$REQUESTED_VERSION" != "$ENCORE_RELEASE_VERSION" ]; then
            echo "release_version input ($REQUESTED_VERSION) does not match ENCORE_RELEASE_VERSION ($ENCORE_RELEASE_VERSION) in scripts/versions.sh" >&2
            exit 1
          fi
          {
            echo "release_version=$ENCORE_RELEASE_VERSION"
            echo "runtime_asset=$ENCORE_RUNTIME_ASSET"
            echo "wine_version=$WINE_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release-candidate run
        id: artifact_run
        shell: bash
        env:
          REQUESTED_RUN_ID: ${{ inputs.artifact_run_id }}
        run: |
          set -Eeuo pipefail
          run_id=${REQUESTED_RUN_ID:-$GITHUB_RUN_ID}
          [[ $run_id =~ ^[0-9]+$ ]] || {
            echo "Invalid artifact workflow run ID: $run_id" >&2
            exit 2
          }
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Install build and runtime dependencies
        if: ${{ inputs.artifact_run_id == '' }}
        run: ./scripts/install-dependencies.sh --install build

      - name: Install runtime dependencies
        if: ${{ inputs.artifact_run_id != '' }}
        run: ./scripts/install-dependencies.sh --install runtime

      - name: Install headless smoke-test tools
        run: apt-get install -y binutils xvfb xauth

      - name: Resolve pinned Wine revision
        if: ${{ inputs.artifact_run_id == '' }}
        id: wine_revision
        run: |
          # Sourced from versions.sh, the single source of truth, rather than
          # text-matched out of a file it merely happened to live in. Sourcing
          # keeps working if the assignment is reordered, quoted, or commented;
          # versions.sh is plain assignments with no $0 dependency, so it is
          # safe to source from anywhere.
          . ./scripts/versions.sh
          [ -n "$WINE_REVISION" ] || { echo "Could not read WINE_REVISION" >&2; exit 1; }
          echo "revision=$WINE_REVISION" >> "$GITHUB_OUTPUT"

      # Wine's own git history rarely changes revision (it's a deliberately
      # pinned constant), so this is usually an exact cache hit that skips
      # the clone entirely. On the rare occasion the pin does change, the
      # restore-key fallback still reuses the prior clone's git objects as a
      # warm base - bootstrap-wine.sh's own fetch+checkout logic reconciles
      # to the new pinned commit from there, which is far cheaper than a
      # fully cold clone.
      #
      # Restore and save are split (rather than the single actions/cache
      # step) because that action's save only runs from its own post step,
      # which is gated success() internally - a later failure anywhere else
      # in the job (e.g. packaging) skips the save entirely, silently
      # discarding a good cache candidate and forcing every subsequent run
      # back to a fully cold build. Saving explicitly with if: always()
      # right after the build step means a later failure can no longer
      # erase this run's cache progress.
      - name: Restore Wine source checkout
        if: ${{ inputs.artifact_run_id == '' }}
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: wine
          key: wine-source-${{ runner.os }}-${{ steps.wine_revision.outputs.revision }}
          restore-keys: |
            wine-source-${{ runner.os }}-

      # ccache caches individual compiled objects by preprocessed source
      # content, not "which ENCORE patch set is this" - most of Wine's DLLs
      # are byte-identical across different ENCORE branches' patch sets, so
      # this stays useful even when switching between them, unlike caching
      # the whole build output would be. A rolling primary key (per run) with
      # a broad restore-key fallback means every run still restores the most
      # recent prior cache, while still being able to save its own updated
      # entry afterward (GitHub Actions cache entries are immutable once
      # saved under a given key).
      - name: Restore ccache
        if: ${{ inputs.artifact_run_id == '' }}
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Build patched Wine
        if: ${{ inputs.artifact_run_id == '' }}
        run: ./scripts/build-wine.sh

      # Saved here, not left to the automatic post-step, so a later failure
      # in WineASIO/packaging/upload can't discard the cache from a Wine
      # build that itself succeeded. always() also covers "Build patched
      # Wine" itself failing: a partial ccache is still a better starting
      # point than an empty one.
      - name: Save Wine source checkout
        if: ${{ inputs.artifact_run_id == '' && always() }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: wine
          key: wine-source-${{ runner.os }}-${{ steps.wine_revision.outputs.revision }}

      - name: Save ccache
        if: ${{ inputs.artifact_run_id == '' && always() }}
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .ccache
          key: ccache-${{ runner.os }}-${{ github.run_id }}

      - name: Build WineASIO
        if: ${{ inputs.artifact_run_id == '' }}
        run: ./scripts/build-wineasio.sh

      - name: Smoke-test WineASIO
        if: ${{ inputs.artifact_run_id == '' }}
        shell: bash
        run: |
          set -Eeuo pipefail
          test -s runtime/wineasio/wineasio64.dll
          test -s runtime/wineasio/wineasio64.dll.so
          test -x runtime/wineasio/jacklinkd
          if dependencies=$(ldd runtime/wineasio/jacklinkd 2>&1) &&
             grep -F 'not found' <<<"$dependencies"; then
            printf '%s\n' "$dependencies" >&2
            echo "Unresolved jacklinkd dependency" >&2
            exit 1
          fi
          # regsvr32 needs the /s (silent) flag: without it, Wine's regsvr32
          # pops up a "DllRegisterServer succeeded" MessageBox and blocks on
          # its own message loop waiting for a click that never comes in this
          # headless container - that dialog wait, not anything in WineASIO
          # itself, was the real cause of this step's hang.
          stage_dir=$(mktemp -d /tmp/encore-wineasio-stage.XXXXXX)
          make -C build/wine64 install-lib DESTDIR="$stage_dir" INSTALL_PROGRAM_FLAGS=-s
          staged="$stage_dir/opt/encore-wine"
          prefix=$(mktemp -d /tmp/encore-wineasio-prefix.XXXXXX)
          export WINE="$staged/bin/wine"
          export WINESERVER="$staged/bin/wineserver"
          export WINEASIO_SO="$PWD/runtime/wineasio/wineasio64.dll.so"
          export WINEPREFIX="$prefix"
          export WINEDEBUG=-all
          export WINEDLLOVERRIDES='mscoree,mshtml,winemenubuilder.exe,dcomp='
          export WINEASIO_DIR="$PWD/runtime/wineasio"
          export XDG_CACHE_HOME="$RUNNER_TEMP/encore-wineasio-cache"
          xvfb-run -a timeout --signal=TERM --kill-after=10s 60s \
            bash -Eeuo pipefail <<'SMOKE'
          cleanup()
          {
              "$WINESERVER" -k >/dev/null 2>&1 || true
          }
          trap cleanup EXIT HUP INT TERM
          "$WINE" wineboot.exe -u
          WINEDLLPATH="$WINEASIO_DIR" "$WINE" regsvr32 /s "$WINEASIO_SO"
          "$WINESERVER" -k
          trap - EXIT HUP INT TERM
          SMOKE
        # WineASIO is opt-in and build-from-source-only (see docs/wineasio.md);
        # this only proves the driver builds, links, and registers cleanly -
        # actually opening the device needs a live JACK/PipeWire session and
        # real audio hardware, which this container does not have.

      - name: Package runtime and corresponding source
        if: ${{ inputs.artifact_run_id == '' }}
        run: ./scripts/package-wine-release.sh "${{ steps.versions.outputs.release_version }}" "$PWD/dist"

      - name: Upload release candidates
        if: ${{ inputs.artifact_run_id == '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: encore-wine-${{ steps.versions.outputs.release_version }}
          path: |
            dist/*.tar.xz
            dist/SHA256SUMS
          if-no-files-found: error
          compression-level: 0
          retention-days: 7

      - name: Download existing release candidates
        if: ${{ inputs.artifact_run_id != '' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: encore-wine-${{ steps.versions.outputs.release_version }}
          path: dist
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.artifact_run.outputs.run_id }}

      - name: Smoke-test a fresh prefix
        shell: bash
        run: |
          set -Eeuo pipefail
          cd dist
          sha256sum -c SHA256SUMS
          cd ..
          mkdir -p "$RUNNER_TEMP/encore runtime"
          tar -xJf "dist/$ENCORE_RUNTIME_ASSET" -C "$RUNNER_TEMP/encore runtime"
          runtime="$RUNNER_TEMP/encore runtime/encore-wine"
          test "$("$runtime/bin/wine" --version)" = "wine-${{ steps.versions.outputs.wine_version }}"
          while IFS= read -r -d '' candidate; do
            readelf -h "$candidate" >/dev/null 2>&1 || continue
            if ! dependencies=$(LD_LIBRARY_PATH="$runtime/lib/wine/x86_64-unix" \
                ldd "$candidate" 2>&1); then
              printf '%s\n' "$dependencies" >&2
              echo "Could not inspect runtime dependency: $candidate" >&2
              exit 1
            fi
            if grep -F 'not found' <<<"$dependencies"; then
              echo "Unresolved runtime dependency: $candidate" >&2
              exit 1
            fi
          done < <(find "$runtime" -type f -print0)
          prefix=$(mktemp -d /tmp/encore-wine-prefix.XXXXXX)
          objdump -f "$runtime/lib/wine/i386-windows/cmd.exe" | \
            grep -Eq 'architecture: i386(,|$)'
          export RUNTIME="$runtime"
          export WINEPREFIX="$prefix"
          export WINEDEBUG=-all
          export WINEDLLOVERRIDES='mscoree,mshtml,winemenubuilder.exe,dcomp='
          export XDG_CACHE_HOME="$RUNNER_TEMP/encore-wine-cache"
          xvfb-run -a timeout --signal=TERM --kill-after=10s 90s \
            bash -Eeuo pipefail <<'SMOKE'
          cleanup()
          {
              "$RUNTIME/bin/wineserver" -k >/dev/null 2>&1 || true
          }
          trap cleanup EXIT HUP INT TERM
          "$RUNTIME/bin/wineboot" -u
          test -s "$WINEPREFIX/drive_c/windows/syswow64/ntdll.dll"
          test -s "$WINEPREFIX/drive_c/windows/syswow64/cmd.exe"
          wow64_arch=$(
              "$RUNTIME/bin/wine" 'C:\windows\syswow64\cmd.exe' /d /c \
                  'echo %PROCESSOR_ARCHITECTURE%' | tr -d '\r'
          )
          test "$wow64_arch" = x86
          "$RUNTIME/bin/wine" reg.exe query 'HKCU\Software\Wine' >/dev/null
          windows_path=$("$RUNTIME/bin/winepath" 'C:\windows' | tr -d '\r')
          test -d "$windows_path"
          "$RUNTIME/bin/wineserver" -k
          "$RUNTIME/bin/wineserver" -w
          test -s "$WINEPREFIX/system.reg"
          trap - EXIT HUP INT TERM
          SMOKE
        env:
          ENCORE_RUNTIME_ASSET: ${{ steps.versions.outputs.runtime_asset }}

      - name: Attest release candidates
        if: ${{ inputs.artifact_run_id == '' }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*.tar.xz

  distro-smoke:
    name: Smoke test on ${{ matrix.name }}
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    env:
      DEBIAN_FRONTEND: noninteractive
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.04
            image: ubuntu:24.04
            bootstrap_packages: apt-get update && apt-get install -y ca-certificates git
            smoke_packages: apt-get update && apt-get install -y binutils xvfb xauth
          - name: Fedora
            image: fedora:latest
            bootstrap_packages: dnf install -y ca-certificates git
            smoke_packages: dnf install -y binutils xorg-x11-server-Xvfb xorg-x11-xauth
          - name: Arch Linux
            image: archlinux:latest
            bootstrap_packages: pacman -Syu --needed --noconfirm ca-certificates git
            smoke_packages: pacman -Syu --needed --noconfirm binutils xorg-server-xvfb xorg-xauth

    container:
      image: ${{ matrix.image }}

    steps:
      - name: Bootstrap the smoke-test container
        run: ${{ matrix.bootstrap_packages }}

      - name: Check out ENCORE
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download release candidates
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: encore-wine-${{ needs.build.outputs.release_version }}
          path: dist
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ needs.build.outputs.artifact_run_id }}

      - name: Install distro runtime dependencies
        run: ./scripts/install-dependencies.sh --install runtime

      - name: Install headless smoke-test tools
        run: ${{ matrix.smoke_packages }}

      - name: Verify archive and initialize Wine
        shell: bash
        run: |
          set -Eeuo pipefail
          cd dist
          sha256sum -c SHA256SUMS
          cd ..
          mkdir -p "$RUNNER_TEMP/runtime"
          tar -xJf "dist/${{ needs.build.outputs.runtime_asset }}" \
            -C "$RUNNER_TEMP/runtime"
          runtime="$RUNNER_TEMP/runtime/encore-wine"
          test "$("$runtime/bin/wine" --version)" = "wine-${{ needs.build.outputs.wine_version }}"
          while IFS= read -r -d '' candidate; do
            readelf -h "$candidate" >/dev/null 2>&1 || continue
            if ! dependencies=$(LD_LIBRARY_PATH="$runtime/lib/wine/x86_64-unix" \
                ldd "$candidate" 2>&1); then
              printf '%s\n' "$dependencies" >&2
              echo "Could not inspect runtime dependency: $candidate" >&2
              exit 1
            fi
            if grep -F 'not found' <<<"$dependencies"; then
              echo "Unresolved runtime dependency: $candidate" >&2
              exit 1
            fi
          done < <(find "$runtime" -type f -print0)
          prefix=$(mktemp -d /tmp/encore-wine-prefix.XXXXXX)
          objdump -f "$runtime/lib/wine/i386-windows/cmd.exe" | \
            grep -Eq 'architecture: i386(,|$)'
          export RUNTIME="$runtime"
          export WINEPREFIX="$prefix"
          export WINEDEBUG=-all
          export WINEDLLOVERRIDES='mscoree,mshtml,winemenubuilder.exe,dcomp='
          export XDG_CACHE_HOME="$RUNNER_TEMP/encore-wine-cache"
          xvfb-run -a timeout --signal=TERM --kill-after=10s 90s \
            bash -Eeuo pipefail <<'SMOKE'
          cleanup()
          {
              "$RUNTIME/bin/wineserver" -k >/dev/null 2>&1 || true
          }
          trap cleanup EXIT HUP INT TERM
          "$RUNTIME/bin/wineboot" -u
          test -s "$WINEPREFIX/drive_c/windows/syswow64/ntdll.dll"
          test -s "$WINEPREFIX/drive_c/windows/syswow64/cmd.exe"
          wow64_arch=$(
              "$RUNTIME/bin/wine" 'C:\windows\syswow64\cmd.exe' /d /c \
                  'echo %PROCESSOR_ARCHITECTURE%' | tr -d '\r'
          )
          test "$wow64_arch" = x86
          "$RUNTIME/bin/wine" reg.exe query 'HKCU\Software\Wine' >/dev/null
          windows_path=$("$RUNTIME/bin/winepath" 'C:\windows' | tr -d '\r')
          test -d "$windows_path"
          "$RUNTIME/bin/wineserver" -k
          "$RUNTIME/bin/wineserver" -w
          test -s "$WINEPREFIX/system.reg"
          trap - EXIT HUP INT TERM
          SMOKE
